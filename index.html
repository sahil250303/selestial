<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title, description, canonical and Open Graph/Twitter tags are all rendered
       per-page by React (React 19 native document metadata). Keeping them out of
       this shell guarantees a single, correct <title> with no duplicates. -->
  <meta name="theme-color" content="#000000" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Preload the LCP hero image -->
  <link rel="preload" as="image" href="/hero_1.png" fetchpriority="high" />

  <!-- Organization + WebSite JSON-LD structured data -->
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Selestial",
      "url": "https://selestial-lovat.vercel.app",
      "logo": "https://selestial-lovat.vercel.app/SVG/SELESTIAL.LGOG%20IN%20WHITE.svg?v=2",
      "description": "Premium 925 sterling silver jewellery brand. Rings, chains, bracelets and earrings crafted with celestial precision.",
      "sameAs": [
        "https://www.instagram.com/selestial",
        "https://www.pinterest.com/selestial"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "email": "hello@selestial.com"
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Selestial",
      "url": "https://selestial-lovat.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://selestial-lovat.vercel.app/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  ]
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
