# Selestial — Nginx production configuration with HTTPS
# Steps to activate:
#   1. Replace YOUR_DOMAIN with your real domain (e.g. selestial.com)
#   2. Run: sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#   3. Certbot will fill in the SSL certificate paths automatically.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name YOUR_DOMAIN www.YOUR_DOMAIN;

  # Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name YOUR_DOMAIN www.YOUR_DOMAIN;

  # SSL certificates (certbot fills these in automatically)
  ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # HSTS — force HTTPS for 1 year
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Additional security headers
  add_header X-Frame-Options        "SAMEORIGIN"                     always;
  add_header X-Content-Type-Options "nosniff"                        always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

  # Allow large uploads (multer limit is 10MB)
  client_max_body_size 12m;

  # Proxy to Node.js / Express
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }
}
